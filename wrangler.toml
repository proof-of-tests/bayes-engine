name = "bayes-engine"
main = "result/worker/worker.js"
compatibility_date = "2024-10-01"

# Enable Workers Logs for observability
# Logs are viewable in the CloudFlare dashboard under Workers & Pages > Observability
[observability]
enabled = true

[build]
command = "nix build .#webapp"

# Serve static assets (HTML, CSS, WASM) from the assets directory
# CloudFlare Workers will automatically serve these files
[assets]
directory = "result/assets"
# Enable SPA mode: serve index.html for any route that doesn't match a static file
# This allows client-side routing to work with direct URL access
not_found_handling = "single-page-application"

# R2 bucket for WASM file storage
[[r2_buckets]]
binding = "WASM_BUCKET"
bucket_name = "bayes-engine-wasm"

# D1 database for HLL hash state (the only mutable data)
[[d1_databases]]
binding = "HLL_DB"
database_name = "bayes-hll"
database_id = "placeholder-will-be-created"

# KV namespace for catalog data (repositories, versions, files)
[[kv_namespaces]]
binding = "CATALOG"
id = "placeholder-will-be-created"

# Production environment - includes custom domain routes
[env.production]
routes = [
  { pattern = "bayes.lemmih.com", zone_name = "lemmih.com", custom_domain = true }
]

[env.production.observability]
enabled = true

[[env.production.r2_buckets]]
binding = "WASM_BUCKET"
bucket_name = "bayes-engine-wasm"

[[env.production.d1_databases]]
binding = "HLL_DB"
database_name = "bayes-hll"
database_id = "placeholder-will-be-created"

[[env.production.kv_namespaces]]
binding = "CATALOG"
id = "placeholder-will-be-created"

[env.production.assets]
directory = "result/assets"
not_found_handling = "single-page-application"

# E2E testing environment - uses pre-compiled files without running build
[env.e2e]
# No build command - assumes result/ directory already exists with compiled files

[env.e2e.observability]
enabled = true

[[env.e2e.r2_buckets]]
binding = "WASM_BUCKET"
bucket_name = "bayes-engine-wasm"

[[env.e2e.d1_databases]]
binding = "HLL_DB"
database_name = "bayes-hll"
database_id = "placeholder-will-be-created"

[[env.e2e.kv_namespaces]]
binding = "CATALOG"
id = "placeholder-will-be-created"

[env.e2e.assets]
directory = "result/assets"
not_found_handling = "single-page-application"
